{% extends "base.html" %}

{% block title %}二维码签到 - {{ activity.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-header text-center">
                <h4 class="mb-0">
                    <i class="fas fa-qrcode me-2"></i>二维码签到
                </h4>
            </div>
            <div class="card-body text-center">
                <h5 class="card-title">{{ activity.title }}</h5>
                <p class="text-muted mb-4">{{ activity.location }}</p>
                
                <!-- 二维码 -->
                <div class="mb-4">
                    <img src="data:image/png;base64,{{ qr_code_data }}" 
                         alt="签到二维码" 
                         class="img-fluid" 
                         style="max-width: 300px;">
                </div>
                
                <div class="alert alert-info">
                    <i class="fas fa-info-circle me-2"></i>
                    请使用手机扫描二维码完成签到
                </div>
                
                <!-- 签到按钮 -->
                <button type="button" class="btn btn-success btn-lg" id="checkinBtn">
                    <i class="fas fa-check me-2"></i>确认签到
                </button>
                
                <div class="mt-3">
                    <a href="{{ url_for('activity_detail', activity_id=activity.id) }}" 
                       class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left me-2"></i>返回活动详情
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 签到结果模态框 -->
<div class="modal fade" id="checkinModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">签到结果</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <div id="checkinResult">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">签到中...</span>
                    </div>
                    <p class="mt-2">正在处理签到...</p>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('checkinBtn').addEventListener('click', function() {
    const modal = new bootstrap.Modal(document.getElementById('checkinModal'));
    modal.show();
    
    // 发送签到请求
    fetch('{{ url_for("scan_qr_checkin", activity_id=activity.id) }}', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: 'qr_token={{ qr_token }}'
    })
    .then(response => response.json())
    .then(data => {
        const resultDiv = document.getElementById('checkinResult');
        if (data.success) {
            resultDiv.innerHTML = `
                <div class="text-success">
                    <i class="fas fa-check-circle fa-3x mb-3"></i>
                    <h5>签到成功！</h5>
                    <p>${data.message}</p>
                </div>
            `;
        } else {
            resultDiv.innerHTML = `
                <div class="text-danger">
                    <i class="fas fa-times-circle fa-3x mb-3"></i>
                    <h5>签到失败</h5>
                    <p>${data.message}</p>
                </div>
            `;
        }
    })
    .catch(error => {
        const resultDiv = document.getElementById('checkinResult');
        resultDiv.innerHTML = `
            <div class="text-danger">
                <i class="fas fa-exclamation-triangle fa-3x mb-3"></i>
                <h5>网络错误</h5>
                <p>请检查网络连接后重试</p>
            </div>
        `;
    });
});
</script>
{% endblock %}
