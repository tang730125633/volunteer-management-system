{% extends "base.html" %}

{% block title %}创建活动 - 社区志愿者管理系统{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">
                    <i class="fas fa-plus me-2"></i>创建新活动
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-8">
                            <div class="mb-3">
                                <label for="title" class="form-label">活动标题 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="title" name="title" required>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="max_participants" class="form-label">最大参与人数</label>
                                <input type="number" class="form-control" id="max_participants" name="max_participants" min="1" value="50">
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">活动描述</label>
                        <textarea class="form-control" id="description" name="description" rows="4"></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="start_time" class="form-label">开始时间 <span class="text-danger">*</span></label>
                                <input type="datetime-local" class="form-control" id="start_time" name="start_time" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="end_time" class="form-label">结束时间 <span class="text-danger">*</span></label>
                                <input type="datetime-local" class="form-control" id="end_time" name="end_time" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="location" class="form-label">活动地点</label>
                        <input type="text" class="form-control" id="location" name="location">
                    </div>
                    
                    <div class="mb-3">
                        <label for="requirements" class="form-label">参与要求</label>
                        <textarea class="form-control" id="requirements" name="requirements" rows="3"></textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin_activities') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>返回列表
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>创建活动
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// 设置默认时间
const now = new Date();
const startTime = new Date(now.getTime() + 24 * 60 * 60 * 1000); // 明天
const endTime = new Date(startTime.getTime() + 2 * 60 * 60 * 1000); // 2小时后

document.getElementById('start_time').value = startTime.toISOString().slice(0, 16);
document.getElementById('end_time').value = endTime.toISOString().slice(0, 16);

// 时间验证
document.getElementById('end_time').addEventListener('change', function() {
    const startTime = new Date(document.getElementById('start_time').value);
    const endTime = new Date(this.value);
    
    if (endTime <= startTime) {
        this.setCustomValidity('结束时间必须晚于开始时间');
    } else {
        this.setCustomValidity('');
    }
});
</script>
{% endblock %}
